name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  disable-github-pages:
    name: Disable GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Disable Pages because Vercel is the canonical deploy target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/pages" || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  server:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-only-jwt-secret
      JOY_QR_SECRET: ci-only-joy-qr-secret
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test
