################################################################################
# render.yaml — Render Blueprint
# Chạy Node.js + Python FastAPI trong CÙNG 1 Web Service.
#
# Cách hoạt động:
#   1. Build: cài npm + pip dependencies
#   2. Start: start.sh khởi động Python (port 8000, nền) rồi Node.js ($PORT, chính)
#   3. Node.js proxy /api/ai/* → http://127.0.0.1:8000 (nội bộ)
################################################################################

services:
  - type: web
    name: hugostudio-api           # Đổi thành tên service đang chạy trên Render nếu muốn update
    runtime: node
    region: singapore

    # Build: cài cả npm và pip
    buildCommand: |
      npm install --prefix server
      pip install -r python-ai-server/requirements.txt

    # Start: chạy cả 2 server qua script
    startCommand: bash start.sh

    # Render expose port này ra ngoài (Node.js lắng nghe)
    # Python chạy nội bộ port 8000 — không cần expose
    plan: free

    healthCheckPath: /health       # Node.js cần có GET /health endpoint

    envVars:
      # ── Node.js ──────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: MONGODB_URI
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: INTERNAL_API_KEY
        sync: false

      # ── Python AI ─────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        value: "https://hugostudio.vn,https://hugowishpax.studio,https://www.hugostudio.vn"

      - key: PYTHONUNBUFFERED
        value: "1"
